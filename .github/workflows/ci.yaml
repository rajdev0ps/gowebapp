# CICD using GitHub actions

name: CI/CD

# Exclude the workflow to run on changes to the helm chart
on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'helm/**'
      - 'k8s/**'
      - 'README.md'

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.vars.outputs.environment }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      values_file: ${{ steps.vars.outputs.values_file }}

    steps:
    - name: Determine environment and image tag from branch
      id: vars
      run: |
        SHORT_SHA=${GITHUB_SHA::7}
        if [ "${{ github.ref_name }}" = "main" ]; then
          ENVIRONMENT=prod
        else
          ENVIRONMENT=dev
        fi
        echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
        echo "image_tag=${ENVIRONMENT}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
        echo "values_file=values-${ENVIRONMENT}.yaml" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build
      run: go build -o go-web-app

    - name: Test
      run: go test ./...
  
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository go webapp
      uses: actions/checkout@v4

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest
  
  push:
    runs-on: ubuntu-latest
    needs:
      - setup
      - build
      - code-quality

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push action
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:${{ needs.setup.outputs.image_tag }}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest

    needs:
      - setup
      - push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update tag in Helm values
      run: |
        sed -i 's/tag: .*/tag: "${{ needs.setup.outputs.image_tag }}"/' helm/go-web-app-chart/${{ needs.setup.outputs.values_file }}

    - name: Commit and push changes
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add helm/go-web-app-chart/${{ needs.setup.outputs.values_file }}

        git diff --cached --quiet || git commit -m "Update ${{ needs.setup.outputs.environment }} image tag to ${{ needs.setup.outputs.image_tag }}"
        git push

