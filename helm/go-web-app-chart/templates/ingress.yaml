apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-web-app
  labels:
    app: go-web-app
    env: {{ .Values.env }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host }}
    http: 
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: go-web-app
            port:
              number: 80